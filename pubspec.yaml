name: echelon_finance
description: "The Ledger — Personal Finance Tracker by Echelon"
publish_to: none
version: 1.1.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Charts
  fl_chart: ^0.68.0

  # AI / HTTP
  http: ^1.2.1

  # Voice input
  speech_to_text: ^7.3.0

  # Secure storage
  flutter_secure_storage: ^10.0.0

  # Fonts
  google_fonts: ^6.2.1

  # UUID generation
  uuid: ^4.4.0

  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0
  connectivity_plus: ^6.0.3

  # SMS reading (Android only)
  flutter_sms_inbox: ^1.0.3

  # Runtime permissions
  permission_handler: ^11.3.1

  # Export (CSV + PDF)
  share_plus: ^10.0.3
  pdf: ^3.11.1
  path_provider: ^2.1.3

  # Local notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
